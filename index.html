<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>손위생 타이밍 마스터-감염관리아카데미 — 학생용</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a1a;}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:#185FA5;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:15px;font-weight:600;color:#1a1a1a;}
.student-badge{background:#EAF3DE;color:#27500A;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid #C0DD97;}
.main{max-width:560px;margin:0 auto;padding:24px 16px 100px;}
.scenario-header{text-align:center;margin-bottom:24px;}
.badge{display:inline-block;background:#E6F1FB;color:#0C447C;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:8px;}
.scenario-title{font-size:22px;font-weight:700;color:#1a1a1a;}
.scenario-hint{font-size:13px;color:#6b7280;margin-top:6px;}
.progress-bar-wrap{background:#e5e7eb;border-radius:20px;height:4px;margin:16px 0 4px;overflow:hidden;}
.progress-bar{height:100%;background:#185FA5;border-radius:20px;}
.progress-text{font-size:12px;color:#6b7280;text-align:right;}
.timeline{position:relative;padding:8px 0;}
.timeline-line{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#d1d5db;transform:translateX(-50%);z-index:0;}
.timeline-row{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin:4px 0;}
.action-card{background:#fff;border:2px solid #1a1a1a;border-radius:12px;padding:12px 20px;margin:4px 0;max-width:320px;width:100%;text-align:center;}
.action-text{font-size:14px;font-weight:600;color:#1a1a1a;}
.explanation{margin-top:8px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;max-width:260px;text-align:center;}
.explanation.ok{background:#EAF3DE;color:#27500A;border:1px solid #C0DD97;}
.explanation.err{background:#FCEBEB;color:#791F1F;border:1px solid #F7C1C1;}
.explanation.missed{background:#FAEEDA;color:#633806;border:1px solid #FAC775;}
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 20px;background:#fff;border-top:1px solid #e5e7eb;z-index:20;}
.primary-btn{width:100%;max-width:560px;margin:0 auto;display:block;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;}
.btn-blue{background:#185FA5;color:#fff;}
.btn-dark{background:#1a1a1a;color:#fff;}
.result-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:32px 24px;text-align:center;}
.result-score{font-size:52px;font-weight:700;color:#185FA5;margin:12px 0;}
.result-breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:20px 0;}
.breakdown-item{background:#f8f9fa;border-radius:8px;padding:12px;}
.breakdown-num{font-size:20px;font-weight:700;}
.breakdown-label{font-size:12px;color:#6b7280;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C12 2 5 9.5 5 14.5a7 7 0 0014 0C19 9.5 12 2 12 2Z" fill="white" opacity="0.9"/></svg></div>
    <span class="logo-text">손위생 타이밍 마스터-감염관리아카데미</span>
  </div>
  <div class="student-badge">학생용</div>
</div>
<div class="main" id="mc"></div>
<div style="text-align:center;padding:8px 16px 96px;font-size:11px;color:#9ca3af;">ⓒ순천향대학교부속부천병원감염관리팀.2026</div>
<div class="bottom-bar" id="bb"></div>
<script>
var HINT='손위생이 필요한 시점에 해당하면 물방울을 클릭하세요';
var SC=[
  {id:1,title:"혈당 측정",actions:["병실 입실","구두로 환자확인","알코올 솜으로 환자 피부 소독","Lancet을 장착한 채혈기로 채혈","혈당측정기 적용"],hasIcon:[false,false,true,true,false,true],answers:[false,false,true,false,false,true],explanations:["","","환자 접촉 전 & 청결/무균 처치 전","연속된 청결/무균 처치 상황","","체액 노출 위험 후"]},
  {id:2,title:"IV 삽입",actions:["토니켓 묶기","알코올 솜으로 환자 피부 소독","IV 카테터 삽입","IV 카테터 버리기"],hasIcon:[true,true,true,false,true],answers:[true,true,false,false,true],explanations:["환자 접촉 전","청결/무균 처치 전","연속된 청결/무균 처치 상황","","체액 노출 위험 후"]},
  {id:3,title:"주사제 투여",actions:["주사약품 준비","병실 문 열기","환자 팔찌 등록번호 확인","injection port 소독","주사제 투입"],hasIcon:[true,true,true,true,true,true],answers:[true,false,true,true,false,true],explanations:["청결/무균 처치 전","불필요(의료영역 접촉 전)","환자 접촉 전","청결/무균 처치 전","연속된 청결/무균 처치 상황","체액 노출 위험 후"]},
  {id:4,title:"Foley catheter 삽입",actions:["Foley set 준비","병실로 이동","환자 자세변경, set 열기","멸균장갑 착용","Foley catheter 삽입","장갑제거","고정장치 부착","물품정리"],hasIcon:[true,false,true,true,false,false,true,false,true],answers:[true,false,true,true,false,false,true,false,true],explanations:["청결/무균 처치 전","","환자 접촉 전","청결/무균 처치 전","","","체액 노출 위험 후","","체액 노출 위험 후"]},
  {id:5,title:"전실이 없는 격리병실 입실",actions:["가운, 장갑 착용","격리병실 입실","환자 상태 확인을 위해 환자와 접촉","가운과 장갑 벗기","격리실 문을 열고 나옴"],hasIcon:[true,true,false,false,true,false],answers:[true,false,false,false,true,false],explanations:["환자 접촉 전 — 보호구 착용 전 손위생을 시행합니다","보호구를 착용할 경우, 보호구 착용 전에 손위생을 시행합니다","","","환자 접촉 후 — 보호구 제거 후 손위생을 시행합니다",""]}
];
var ci=0,ua=[],sr=false,fin=false,sh=[];
function ia(){ua=Array(SC[ci].hasIcon.length).fill(false);sr=false;}
function tg(i){if(sr)return;ua[i]=!ua[i];rn();}
function cs(){var s=SC[ci],c=0,t=0;s.answers.forEach(function(a,i){if(s.hasIcon[i]){t++;if(ua[i]===a)c++;}});return{correct:c,total:t};}
function sb(){sh.push(cs());sr=true;rn();}
function nx(){if(ci<SC.length-1){ci++;ia();rn();}else{fin=true;rn();}}
function rs(){ci=0;ua=[];sr=false;fin=false;sh=[];rn();}
function ds(state){
  var f={default:'#fff',checked:'#185FA5',correct:'#3B6D11',wrong:'#791F1F',missed:'#854F0B',neutral:'#f3f4f6'};
  var sk={default:'#d1d5db',checked:'#185FA5',correct:'#3B6D11',wrong:'#791F1F',missed:'#854F0B',neutral:'#e5e7eb'};
  var df={default:'#d1d5db',checked:'white',correct:'white',wrong:'white',missed:'white',neutral:'#e5e7eb'};
  return '<svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="24" fill="'+f[state]+'" stroke="'+sk[state]+'" stroke-width="1.5"/><path d="M26 13C26 13 17 23 17 30a9 9 0 0018 0C35 23 26 13 26 13Z" fill="'+df[state]+'" opacity="0.85"/></svg>';
}
function rp(){
  var s=SC[ci];
  if(fin){
    var tot=sh.reduce(function(a,b){return a+b.total;},0),cor=sh.reduce(function(a,b){return a+b.correct;},0);
    var pct=tot>0?Math.round(cor/tot*100):0;
    return '<div class="result-card"><div style="font-size:14px;color:#6b7280">학습 완료!</div><div class="result-score">'+pct+'점</div><div style="font-size:14px;color:#6b7280;margin-bottom:4px">'+cor+'/'+tot+' 정답</div><div class="result-breakdown">'+sh.map(function(sc,i){return '<div class="breakdown-item"><div class="breakdown-num" style="color:'+(Math.round(sc.correct/sc.total*100)>=70?'#3B6D11':'#A32D2D')+'">'+Math.round(sc.correct/sc.total*100)+'%</div><div class="breakdown-label">문제 '+(i+1)+'</div></div>';}).join('')+'</div></div>';
  }
  var html='<div class="scenario-header"><div><div class="progress-bar-wrap"><div class="progress-bar" style="width:'+(ci/SC.length*100)+'%"></div></div><div class="progress-text">'+(ci+1)+' / '+SC.length+'</div></div><div class="badge">Scenario '+(ci+1)+'</div><div class="scenario-title">'+s.title+'</div><div class="scenario-hint">'+HINT+'</div></div>';
  if(sr)html+='<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>정답</div><div class="legend-item"><div class="legend-dot" style="background:#791F1F"></div>오답</div><div class="legend-item"><div class="legend-dot" style="background:#854F0B"></div>놓친 항목</div></div>';
  html+='<div class="timeline"><div class="timeline-line"></div>';
  for(var idx=0;idx<s.hasIcon.length;idx++){
    var hIcon=s.hasIcon[idx],isChecked=ua[idx],isCorrect=s.answers[idx],isLast=idx===s.hasIcon.length-1;
    if(hIcon){
      var state='default';
      if(!sr&&isChecked)state='checked';
      if(sr){if(isChecked&&isCorrect)state='correct';else if(isChecked&&!isCorrect)state='wrong';else if(!isChecked&&isCorrect)state='missed';else state='neutral';}
      html+='<div class="timeline-row" style="margin:8px 0;"><div '+(sr?'style="cursor:default"':'onclick="tg('+idx+')" style="cursor:pointer"')+'>'+ds(state)+'</div>';
      if(sr){var expl=s.explanations[idx]||'추가 설명 없음';if(isChecked&&isCorrect)html+='<div class="explanation ok">✓ '+expl+'</div>';else if(isChecked&&!isCorrect)html+='<div class="explanation err">✗ 불필요한 손위생 — '+expl+'</div>';else if(!isChecked&&isCorrect)html+='<div class="explanation missed">! 놓친 손위생 — '+expl+'</div>';}
      html+='</div>';
    } else {
      html+='<div class="timeline-row" style="margin:2px 0;height:12px;"></div>';
    }
    if(!isLast&&idx<s.actions.length)html+='<div class="timeline-row" style="margin:4px 0;"><div class="action-card"><div class="action-text">'+s.actions[idx]+'</div></div></div>';
  }
  return html+'</div>';
}
function rb(){
  if(fin)return '<button class="primary-btn btn-blue" onclick="rs()">다시 시작하기</button>';
  if(!sr)return '<button class="primary-btn btn-blue" onclick="sb()">결과 확인하기</button>';
  return '<button class="primary-btn btn-dark" onclick="nx()">'+(ci>=SC.length-1?'전체 결과 보기':'다음 시나리오 →')+'</button>';
}
function rn(){if(!fin&&ua.length===0)ia();document.getElementById('mc').innerHTML=rp();document.getElementById('bb').innerHTML='<div style="max-width:560px;margin:0 auto;">'+rb()+'</div>';}
rn();
</script>
</body>
</html>
